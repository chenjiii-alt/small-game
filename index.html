<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        .game-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #4CAF50;
        }
        p {
            font-size: 18px;
            color: #333;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>猜数字游戏</h1>
        <p>猜一个1到100之间的数字：</p>
        <input type="number" id="guess" min="1" max="100" placeholder="输入你的猜测">
        <button onclick="checkGuess()">提交</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        function checkGuess() {
            let userGuess = document.getElementById('guess').value;
            attempts++;
            if (userGuess == randomNumber) {
                document.getElementById('result').innerText = `恭喜你！猜对了，数字是 ${randomNumber}，你总共猜了 ${attempts} 次。`;
            } else if (userGuess < randomNumber) {
                document.getElementById('result').innerText = '太低了，再试一次！';
            } else {
                document.getElementById('result').innerText = '太高了，再试一次！';
            }
        }
    </script>
</body>
</html>
